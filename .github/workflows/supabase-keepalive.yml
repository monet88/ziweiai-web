name: Supabase keep-alive

# Supabase free-tier projects are paused after ~7 days of no activity.
# This workflow issues a real PostgREST query (which executes SQL against the
# database, not just the gateway) on a schedule to keep the project active.
#
# Schedule note: GitHub cron cannot express "every 5 days" directly. `*/5` on
# the day-of-month field fires on days 1, 6, 11, 16, 21, 26, 31, so the largest
# gap between runs is ~5 days, comfortably under the ~7-day pause threshold.
# A manual run is also available via workflow_dispatch.

on:
  schedule:
    - cron: "0 6 */5 * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase REST (executes a DB query)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::SUPABASE_URL or SUPABASE_ANON_KEY secret is not set."
            exit 1
          fi
          # An RLS-protected table returns 200 with an empty array for the anon
          # role; the request still runs SQL on the database, which is what
          # Supabase counts as activity.
          url="${SUPABASE_URL%/}/rest/v1/profiles?select=*&limit=1"
          code=$(curl -sS -o /tmp/body.txt -w "%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            --max-time 30 "$url")
          echo "HTTP $code"
          head -c 200 /tmp/body.txt || true
          echo
          if [ "$code" != "200" ]; then
            echo "::error::Keep-alive ping failed (expected HTTP 200, got $code)."
            exit 1
          fi
          echo "Supabase keep-alive ping OK."
