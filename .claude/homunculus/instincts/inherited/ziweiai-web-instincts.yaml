# Ziweiai Web Workflow Add Or Update Quota Store Driver

## Action

Follow the add-or-update-quota-store-driver workflow:
1. Define or update the quota store driver implementation (e.g., upstash.ts, memory.ts).
2. Write or update corresponding tests for the driver (e.g., upstash.test.ts, memory.test.ts).
3. Update the quota store interface/abstraction if needed (quota-counter-store.ts).
4. Modify the factory or DI setup to register/select the driver (index.ts, quotas.module.ts).
5. Update service logic to use the new/updated driver (quotas.service.ts).
6. Add or update environment variable documentation (.env.example, env.ts).
7. Write or update documentation and planning files (docs/stories, plans/).

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
